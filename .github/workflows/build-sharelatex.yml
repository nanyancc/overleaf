name: Build ShareLaTeX Image

on:
  schedule:
    # Run weekly on Sunday at 03:00 UTC.
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/nanyancc/sharelatex

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout custom image files
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image version
        run: |
          version="$(date -u '+%Y.%-m.%-d')"
          echo "IMAGE_VERSION=${version}" >> "$GITHUB_ENV"

      - name: Clone Overleaf source
        run: git clone --depth 1 https://github.com/overleaf/overleaf.git overleaf

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build amd64 images
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --platform amd64 \
            -f overleaf/server-ce/Dockerfile-base \
            -t sharelatex/sharelatex-base:local \
            overleaf

          DOCKER_BUILDKIT=1 docker build \
            --platform amd64 \
            -f overleaf/server-ce/Dockerfile \
            --build-arg OVERLEAF_BASE_TAG=sharelatex/sharelatex-base:local \
            -t sharelatex/sharelatex:local \
            overleaf

          DOCKER_BUILDKIT=1 docker build \
            --platform amd64 \
            --build-arg OVERLEAF_IMAGE=sharelatex/sharelatex:local \
            -t "${GHCR_IMAGE}:${IMAGE_VERSION}-amd64" \
            .

          docker push "${GHCR_IMAGE}:${IMAGE_VERSION}-amd64"

      - name: Build arm64 images
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --platform arm64 \
            -f overleaf/server-ce/Dockerfile-base \
            -t sharelatex/sharelatex-base:local \
            overleaf

          DOCKER_BUILDKIT=1 docker build \
            --platform arm64 \
            -f overleaf/server-ce/Dockerfile \
            --build-arg OVERLEAF_BASE_TAG=sharelatex/sharelatex-base:local \
            -t sharelatex/sharelatex:local \
            overleaf

          DOCKER_BUILDKIT=1 docker build \
            --platform arm64 \
            --build-arg OVERLEAF_IMAGE=sharelatex/sharelatex:local \
            -t "${GHCR_IMAGE}:${IMAGE_VERSION}-arm64" \
            .

          docker push "${GHCR_IMAGE}:${IMAGE_VERSION}-arm64"

      - name: Create and push multi-architecture manifests
        run: |
          docker manifest create --amend "${GHCR_IMAGE}:${IMAGE_VERSION}" \
            "${GHCR_IMAGE}:${IMAGE_VERSION}-amd64" \
            "${GHCR_IMAGE}:${IMAGE_VERSION}-arm64"
          docker manifest push "${GHCR_IMAGE}:${IMAGE_VERSION}"

          docker manifest create --amend "${GHCR_IMAGE}:latest" \
            "${GHCR_IMAGE}:${IMAGE_VERSION}-amd64" \
            "${GHCR_IMAGE}:${IMAGE_VERSION}-arm64"
          docker manifest push "${GHCR_IMAGE}:latest"

      - name: Inspect pushed image
        run: docker buildx imagetools inspect "${GHCR_IMAGE}:${IMAGE_VERSION}"
