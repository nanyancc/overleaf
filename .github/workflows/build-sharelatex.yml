name: Build ShareLaTeX Image

on:
  schedule:
    # Run weekly on Sunday at 03:00 UTC.
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  OVERLEAF_REPO: https://github.com/overleaf/overleaf.git
  OVERLEAF_DIR: upstream-overleaf
  GHCR_IMAGE: ghcr.io/nanyancc/sharelatex
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout custom image files
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image version
        run: |
          version="$(date -u '+%Y.%-m.%-d')"
          echo "IMAGE_VERSION=${version}" >> "$GITHUB_ENV"
          echo "OVERLEAF_BASE_IMAGE=${GHCR_IMAGE}:overleaf-base-${version}" >> "$GITHUB_ENV"
          echo "OVERLEAF_APP_IMAGE=${GHCR_IMAGE}:overleaf-app-${version}" >> "$GITHUB_ENV"

      - name: Clone Overleaf source
        run: git clone --depth 1 "$OVERLEAF_REPO" "$OVERLEAF_DIR"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Overleaf base image
        working-directory: ${{ env.OVERLEAF_DIR }}
        run: |
          docker buildx build \
            --platform "${PLATFORMS}" \
            -f server-ce/Dockerfile-base \
            -t "${OVERLEAF_BASE_IMAGE}" \
            --cache-from type=gha,scope=overleaf-base \
            --cache-to type=gha,scope=overleaf-base,mode=max \
            --push \
            .

      - name: Build Overleaf app image
        working-directory: ${{ env.OVERLEAF_DIR }}
        run: |
          docker buildx build \
            --platform "${PLATFORMS}" \
            -f server-ce/Dockerfile \
            --build-arg "OVERLEAF_BASE_TAG=${OVERLEAF_BASE_IMAGE}" \
            -t "${OVERLEAF_APP_IMAGE}" \
            --cache-from type=gha,scope=overleaf-app \
            --cache-to type=gha,scope=overleaf-app,mode=max \
            --push \
            .

      - name: Build custom image
        run: |
          docker buildx build \
            --platform "${PLATFORMS}" \
            --build-arg "OVERLEAF_IMAGE=${OVERLEAF_APP_IMAGE}" \
            -t ${GHCR_IMAGE}:${IMAGE_VERSION} \
            -t ${GHCR_IMAGE}:latest \
            --cache-from type=gha,scope=custom-sharelatex \
            --cache-to type=gha,scope=custom-sharelatex,mode=max \
            --push \
            .

      - name: Inspect pushed image
        run: docker buildx imagetools inspect "${GHCR_IMAGE}:${IMAGE_VERSION}"
